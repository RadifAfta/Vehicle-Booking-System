services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-system-app
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: booking_vehicle
      DB_USERNAME: booking_user
      DB_PASSWORD: booking_pass
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - booking_network

  web:
    image: nginx:1.27-alpine
    container_name: booking-system-web
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - booking_network

  db:
    image: mysql:8.0
    container_name: booking-system-db
    environment:
      MYSQL_DATABASE: booking_vehicle
      MYSQL_USER: booking_user
      MYSQL_PASSWORD: booking_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - booking_network

networks:
  booking_network:
    driver: bridge

volumes:
  db_data:
